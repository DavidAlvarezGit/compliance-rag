name: Keep Streamlit Alive

on:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: First request
        run: |
          curl -L -H "User-Agent: Mozilla/5.0" https://compliance-rag.streamlit.app/

      - name: Wait
        run: sleep 20

      - name: Second request
        run: |
          curl -L -H "User-Agent: Mozilla/5.0" https://compliance-rag.streamlit.app/
